<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Number Generator</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

body{
background:linear-gradient(135deg,#1f2937,#334155);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
color:white;
}

.container{
width:90%;
max-width:420px;
}

.card{
background:#1e293b;
padding:25px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

h2{
text-align:center;
margin-bottom:20px;
font-weight:600;
}

.form-group{
margin-bottom:18px;
}

label{
display:block;
margin-bottom:6px;
font-size:14px;
opacity:0.9;
}

input,select{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#334155;
color:white;
font-size:15px;
outline:none;
}

input:focus,select:focus{
background:#3f4d63;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:0.25s;
}

.generate-btn{
margin-top:10px;
background:linear-gradient(90deg,#3b82f6,#06b6d4);
color:white;
}

.generate-btn:hover{
opacity:0.9;
}

.inventory-btn{
margin-top:18px;
background:linear-gradient(90deg,#fb7185,#f472b6);
color:white;
}

.inventory-btn:hover{
opacity:0.9;
}

.footer{
text-align:center;
font-size:12px;
opacity:0.6;
margin-top:12px;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<h2>Number Generator</h2>

<div class="form-group">
<label>Area Code</label>
<select>
<option>210</option>
<option>214</option>
<option>254</option>
<option>281</option>
<option>325</option>
<option>346</option>
<option>409</option>
<option>430</option>
<option>432</option>
<option>469</option>
<option>512</option>
<option>682</option>
<option>713</option>
<option>726</option>
<option>737</option>
<option>806</option>
<option>817</option>
<option>830</option>
<option>832</option>
<option>903</option>
<option>915</option>
<option>936</option>
<option>940</option>
<option>956</option>
<option>972</option>
<option>979</option>
</select>
</div>

<div class="form-group">
<label>Quantity</label>
<input type="number" value="1" min="1">
</div>

<button class="generate-btn">Generate</button>

<button class="inventory-btn">Go to Inventory</button>

<div class="footer">
Simple Number Tool
</div>

</div>

</div>

</body>
</html>
