<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Number Generator</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

body{
background:linear-gradient(135deg,#1f2937,#334155);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
color:white;
padding:20px;
}

.container{
width:100%;
max-width:900px;
}

.card{
background:#1e293b;
padding:25px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

h2{
text-align:center;
margin-bottom:20px;
font-weight:600;
}

.controls{
display:grid;
grid-template-columns:1fr;
gap:15px;
}

.form-group{
display:flex;
flex-direction:column;
}

label{
margin-bottom:6px;
font-size:14px;
opacity:0.9;
}

input,select{
padding:12px;
border:none;
border-radius:10px;
background:#334155;
color:white;
font-size:15px;
outline:none;
}

button{
padding:14px;
border:none;
border-radius:12px;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:0.25s;
}

.generate-btn{
background:linear-gradient(90deg,#3b82f6,#06b6d4);
color:white;
}

.inventory-btn{
background:linear-gradient(90deg,#fb7185,#f472b6);
color:white;
}

button:hover{
opacity:0.9;
}

/* Result Box */

.result-box{
margin-top:25px;
background:#0f172a;
padding:18px;
border-radius:12px;
display:none;
}

.result-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.copy-btn{
background:#22c55e;
padding:8px 12px;
font-size:14px;
border-radius:8px;
}

textarea{
width:100%;
height:120px;
background:#020617;
color:#38bdf8;
border:none;
border-radius:10px;
padding:10px;
resize:none;
font-size:14px;
}

/* Desktop Layout */

@media(min-width:768px){

.controls{
grid-template-columns:2fr 1fr 1fr 1fr;
align-items:end;
}

}

.footer{
text-align:center;
font-size:12px;
opacity:0.6;
margin-top:12px;
}

</style>
</head>

<body>

<div class="container">
<div class="card">

<h2>Number Generator</h2>

<div class="controls">

<div class="form-group">
<label>Area Code</label>
<select id="area">
<option>210</option>
<option>214</option>
<option>254</option>
<option>281</option>
<option>325</option>
<option>346</option>
<option>409</option>
<option>430</option>
<option>432</option>
<option>469</option>
<option>512</option>
<option>682</option>
<option>713</option>
<option>726</option>
<option>737</option>
<option>806</option>
<option>817</option>
<option>830</option>
<option>832</option>
<option>903</option>
<option>915</option>
<option>936</option>
<option>940</option>
<option>956</option>
<option>972</option>
<option>979</option>
</select>
</div>

<div class="form-group">
<label>Quantity</label>
<input type="number" id="qty" value="1" min="1">
</div>

<button class="generate-btn" onclick="generateNumbers()">Generate</button>

<button class="inventory-btn">Inventory</button>

</div>

<div class="result-box" id="resultBox">

<div class="result-header">
<strong>Generated Numbers</strong>
<button class="copy-btn" id="copyBtn" onclick="copyNumbers()">📋 Copy</button>
</div>

<textarea id="result" readonly></textarea>

</div>

<div class="footer">
Simple Number Tool
</div>

</div>
</div>

<script>

function generateNumbers(){

let area=document.getElementById("area").value;
let qty=document.getElementById("qty").value;
let output="";

for(let i=0;i<qty;i++){

let random=Math.floor(1000000 + Math.random()*9000000);
output+=area+random+"\n";

}

document.getElementById("result").value=output;
document.getElementById("resultBox").style.display="block";

}

function copyNumbers(){

let text=document.getElementById("result");
text.select();
document.execCommand("copy");

let btn=document.getElementById("copyBtn");
btn.innerText="✅ Copied!";

setTimeout(()=>{
btn.innerText="📋 Copy";
},2000);

}

</script>

</body>
</html>
