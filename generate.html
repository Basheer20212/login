<!DOCTYPE html>
<html>
<head>
    <title>Generate Numbers</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body{

            background: linear-gradient(135deg,#141e30,#243b55);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
            color:white;
        }

        h2{
            margin-bottom: 20px;
            font-weight:500;
        }

        .controls{
            display: flex;
            gap:10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        input[type=number], select{
            padding:8px 10px;
            border-radius:8px;
            border:none;
            font-size:16px;
        }

        input[type=number]{ width: 80px; }

        button{
            padding:10px 20px;
            border:none;
            border-radius:8px;
            background: linear-gradient(135deg,#4facfe,#00f2fe);
            color:white;
            font-weight:600;
            cursor:pointer;
            transition: 0.2s;
        }

        button:hover:not(:disabled){
            transform: translateY(-1px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        button:disabled{
            opacity:0.5;
            cursor:not-allowed;
        }

        #inventoryBtn{
            background: linear-gradient(135deg,#ff758c,#ff7eb3);
        }

        #generatedNumbers{
            margin-top:20px;
            width:100%;
            max-width:500px;
            background: rgba(255,255,255,0.08);
            padding: 20px;
            border-radius:12px;
            backdrop-filter: blur(10px);
        }

        ul{
            list-style:none;
            padding-left:0;
        }

        li{
            padding:6px 0;
            border-bottom:1px solid rgba(255,255,255,0.2);
        }
    </style>
</head>
