<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Number Generator</title>
<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

body{
  background:linear-gradient(135deg,#1f2937,#334155);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  padding:20px;
}

.container{
  width:100%;
  max-width:1000px;
}

.card{
  background:#1e293b;
  padding:25px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

h2{
  text-align:center;
  margin-bottom:20px;
  font-weight:600;
}

.controls{
  display:flex;
  flex-direction:column;
  gap:15px;
}

.form-group{
  display:flex;
  flex-direction:column;
}

label{
  margin-bottom:6px;
  font-size:14px;
}

input,select{
  padding:12px;
  border:none;
  border-radius:10px;
  background:#334155;
  color:white;
  font-size:15px;
  outline:none;
}

button{
  padding:14px;
  border:none;
  border-radius:12px;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
  transition:0.25s;
}

button:hover{
  opacity:0.9;
}

.generate-btn{
  background:linear-gradient(90deg,#3b82f6,#06b6d4);
  color:white;
}

.inventory-btn{
  background:linear-gradient(90deg,#fb7185,#f472b6);
  color:white;
  font-size:18px;
  padding:16px;
}

/* RESULT TABLE */

.result-box{
  margin-top:25px;
  background:#0f172a;
  padding:18px;
  border-radius:12px;
  display:none;
  overflow-x:auto;
  position:relative;
}

.result-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  border:1px solid #334155;
  padding:10px;
  text-align:center;
  font-size:14px;
}

th{
  background:#1f2937;
  font-weight:600;
}

.copy-btn{
  background:#22c55e;
  padding:8px 14px;
  font-size:14px;
  border-radius:8px;
  cursor:pointer;
  margin-left:10px;
}

/* DESKTOP LAYOUT */

@media(min-width:768px){
  .controls{
    flex-direction:row;
    align-items:flex-end;
  }
  .form-group{
    flex:2;
  }
  .qty{
    flex:1;
  }
  .generate-btn{
    flex:1;
  }
  .inventory-btn{
    flex:2;
  }
}
</style>
</head>
<body>

<div class="container">
  <div class="card">

    <h2>Number Generator</h2>

    <div class="controls">

      <div class="form-group">
        <label>Area Code</label>
        <select id="area">
          <option>210</option>
          <option>214</option>
          <option>254</option>
          <option>281</option>
          <option>325</option>
          <option>346</option>
          <option>409</option>
          <option>430</option>
          <option>432</option>
          <option>469</option>
          <option>512</option>
          <option>682</option>
          <option>713</option>
          <option>726</option>
          <option>737</option>
          <option>806</option>
          <option>817</option>
          <option>830</option>
          <option>832</option>
          <option>903</option>
          <option>915</option>
          <option>936</option>
          <option>940</option>
          <option>956</option>
          <option>972</option>
          <option>979</option>
        </select>
      </div>

      <div class="form-group qty">
        <label>Quantity</label>
        <input type="number" id="qty" value="1" min="1">
      </div>

      <button class="generate-btn" onclick="generateNumbers()">Generate</button>

      <button class="inventory-btn">Go to Inventory</button>

    </div>

    <div class="result-box" id="resultBox">

      <div class="result-header">
        <strong>Generated Details</strong>
        <button class="copy-btn" id="copyBtn" onclick="copyTable()">Copy</button>
      </div>

      <table id="resultTable">
        <thead>
          <tr>
            <th>Phone Number</th>
            <th>Account Number</th>
            <th>Transfer PIN</th>
            <th>ZIP Code</th>
          </tr>
        </thead>
        <tbody>
        </tbody>
      </table>

    </div>

  </div>
</div>

<script>
function randomDigits(length){
  let result="";
  for(let i=0;i<length;i++){
    result += Math.floor(Math.random()*10);
  }
  return result;
}

function generateNumbers(){
  let area=document.getElementById("area").value;
  let qty=parseInt(document.getElementById("qty").value);

  let tbody=document.querySelector("#resultTable tbody");
  tbody.innerHTML=""; // clear previous

  for(let i=0;i<qty;i++){
    let phone = area + randomDigits(7);
    let account = randomDigits(10);
    let pin = randomDigits(4);
    let zip = randomDigits(5);

    let row=document.createElement("tr");
    row.innerHTML=`<td>${phone}</td><td>${account}</td><td>${pin}</td><td>${zip}</td>`;
    tbody.appendChild(row);
  }

  document.getElementById("resultBox").style.display="block";
}

function copyTable(){
  let table = document.getElementById("resultTable");
  let range = document.createRange();
  range.selectNode(table);
  window.getSelection().removeAllRanges();
  window.getSelection().addRange(range);
  document.execCommand("copy");
  window.getSelection().removeAllRanges();

  let btn=document.getElementById("copyBtn");
  btn.innerText="Copied ✓";
  setTimeout(()=>{btn.innerText="Copy";},2000);
}
</script>

</body>
</html>
