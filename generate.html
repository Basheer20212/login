<style>
/* --- BASIC STYLES --- */
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}
body{background:linear-gradient(135deg,#1f2937,#334155);min-height:100vh;color:white;padding:20px;}
.container{width:100%;max-width:1000px;margin:0 auto;padding-top:20px;}
.card{background:#1e293b;padding:25px;border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,0.4);}
h2{text-align:center;margin-bottom:20px;font-weight:600;}
.controls{display:flex;flex-direction:column;gap:15px;margin-bottom:25px;}
.form-group{display:flex;flex-direction:column;}
label{margin-bottom:6px;font-size:14px;}
input,select{padding:12px;border:none;border-radius:10px;background:#334155;color:white;font-size:15px;outline:none;}
button{padding:14px;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;transition:0.25s;}
button:hover{opacity:0.9;}
.generate-btn{background:linear-gradient(90deg,#3b82f6,#06b6d4);color:white;}
.inventory-btn{background:linear-gradient(90deg,#fb7185,#f472b6);color:white;font-size:18px;padding:16px;}

.result-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;}

.copy-btn{background:#22c55e;padding:8px 14px;font-size:14px;border-radius:8px;cursor:pointer;margin-left:10px;flex-shrink:0;}

@media(max-width:480px){table,th,td{font-size:12px;padding:6px;}.generate-btn,.inventory-btn{font-size:14px;padding:12px;}}
</style>
</head>
<body>

<div class="container">
  <div class="card">
    <h2>Number Generator</h2>

    <!-- Controls -->
    <div class="controls">
      <div class="form-group">
        <label>Area Code</label>
        <select id="area">
          <option>210</option>
          <option>726</option>
        </select>
      </div>

      <div class="form-group qty">
        <label>Quantity</label>
        <input type="number" id="qty" value="1" min="1">
      </div>

      <button class="generate-btn" id="generateBtn">Generate</button>
      <button class="inventory-btn" onclick="window.location.href='example.html'">Go to Inventory</button>
    </div>

    <!-- Result Table -->
    <div class="result-box" id="resultBox">
      <div class="result-header">
        <strong>Generated Details</strong>
        <button class="copy-btn" id="copyBtn" onclick="copyTable()">Copy</button>
      </div>

      <table id="resultTable">
        <thead>
          <tr>
            <th>Phone Number</th>
            <th>Account Number</th>
            <th>Transfer PIN</th>
            <th>ZIP Code</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

  </div>
</div>

<!-- PHP + JS Logic -->
<?php
// Ensure the server supports PHP
if (file_exists('database.db')) {
    // PHP code to fetch numbers
    $db = new SQLite3('database.db');
    $numbers = $db->query('SELECT phone, account, pin, zip FROM numbers');
    $data = [];
    while($row = $numbers->fetchArray(SQLITE3_ASSOC)){
        $data[] = $row;
    }
    $db->close();
    // Embed numbers as JS array
    echo "<script>const numbersData = ".json_encode($data).";</script>";
} else {
    echo "<script>const numbersData = [];</script>";
}
?>

<script>
// Role & generation tracking
const currentUser = JSON.parse(localStorage.getItem('currentUser') || '{}');
const isAdmin = currentUser.roles && currentUser.roles.includes('admin');
let generatedCount = 0;
const maxForUser = 4; // regular user limit

const tbody = document.querySelector('#resultTable tbody');
const generateBtn = document.getElementById('generateBtn');
const resultBox = document.getElementById('resultBox');

generateBtn.addEventListener('click', () => {
    const area = document.getElementById('area').value;
    const qtyInput = parseInt(document.getElementById('qty').value);

    let qty = isAdmin ? qtyInput : Math.min(qtyInput, maxForUser - generatedCount);
    if(qty <= 0) return alert("Regular users can only generate 4 numbers.");

    // Fetch rows from numbersData
    for(let i=0; i<qty; i++){
        if(numbersData[i]){ // check if data exists
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${numbersData[i].phone}</td>
                <td>${numbersData[i].account}</td>
                <td>${numbersData[i].pin}</td>
                <td>${numbersData[i].zip}</td>
            `;
            tbody.appendChild(row);
        }
    }

    resultBox.style.display = 'block';
    if(!isAdmin){
        generatedCount += qty;
        if(generatedCount >= maxForUser) generateBtn.disabled = true;
    }
});

function copyTable(){
  let table=document.getElementById("resultTable");
  let range=document.createRange();
  range.selectNode(table);
  window.getSelection().removeAllRanges();
  window.getSelection().addRange(range);
  document.execCommand("copy");
  window.getSelection().removeAllRanges();
  let btn=document.getElementById("copyBtn");
  btn.innerText="Copied ✓";
  setTimeout(()=>{btn.innerText="Copy";},2000);
}
</script>

</body>
</html>
