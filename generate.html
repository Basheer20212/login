<!DOCTYPE html>
<html>
<head>
    <title>Generate Numbers</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body{
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg,#141e30,#243b55);
            color:white;
            margin:0;
            padding:20px;
        }

        h2{
            text-align:center;
            font-weight:600;
            font-size:28px;
            margin-bottom:30px;
        }

        .controls-container{
            display:flex;
            flex-wrap:wrap;
            gap:15px;
            width:100%;
            max-width:1200px;
            margin:0 auto 30px auto;
            background: rgba(255,255,255,0.08);
            padding:20px;
            border-radius:20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            justify-content: space-between;
        }

        .control-group{
            display:flex;
            flex-direction:column;
            flex:1 1 180px;
        }

        label{
            font-size:14px;
            font-weight:500;
            margin-bottom:5px;
        }

        select, input[type=number], button{
            padding:12px 15px;
            border-radius:12px;
            border:none;
            font-size:16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.25);
            background: rgba(255,255,255,0.12);
            color:white;
            text-align:center;
            transition:0.2s;
        }

        select:focus, input[type=number]:focus{
            outline:none;
            background: rgba(255,255,255,0.2);
        }

        button{
            cursor:pointer;
            font-weight:600;
            transition:0.3s;
            min-width:140px;
        }

        #generateBtn{
            background: linear-gradient(135deg,#4facfe,#00f2fe);
        }

        #inventoryBtn{
            background: linear-gradient(135deg,#ff758c,#ff7eb3);
        }

        button:hover:not(:disabled){
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.35);
        }

        button:disabled{
            opacity:0.5;
            cursor:not-allowed;
        }

        #generatedNumbers{
            width:100%;
            max-width:1200px;
            margin:0 auto;
            background: rgba(255,255,255,0.08);
            padding: 20px;
            border-radius:16px;
            backdrop-filter: blur(10px);
        }

        ul{
            list-style:none;
            padding-left:0;
            margin:0;
        }

        li{
            padding:8px 0;
            border-bottom:1px solid rgba(255,255,255,0.2);
        }

        /* Responsive */
        @media(max-width:768px){
            .controls-container{
                flex-direction:column;
                align-items: stretch;
            }

            .control-group button{
                width:100%;
            }
        }
    </style>
</head>
<body>

<h2>Generate Numbers</h2>

<div class="controls-container">
    <div class="control-group">
        <label>Area Code</label>
        <select id="areaCodeSelect">
            <option value="210">210</option>
            <option value="726">726</option>
        </select>
    </div>
    <div class="control-group">
        <label>Quantity</label>
        <input type="number" id="quantity" min="1" max="5" value="1">
    </div>
    <div class="control-group">
        <label>&nbsp;</label>
        <button id="generateBtn">Generate</button>
    </div>
    <div class="control-group">
        <label>&nbsp;</label>
        <button id="inventoryBtn" disabled>Go to Inventory</button>
    </div>
</div>

<div id="generatedNumbers">
    <ul id="numbersList"></ul>
</div>

<script>
const currentUser = JSON.parse(localStorage.getItem("currentUser"));
const inventoryBtn = document.getElementById("inventoryBtn");

// Enable inventory button only for admin
if(currentUser && currentUser.email === "basheermd2021@gmail.com"){
    inventoryBtn.disabled = false;
    inventoryBtn.onclick = function(){
        window.location.href = "example.html"; // Inventory page
    }
}

// Sample database (if empty)
if(!localStorage.getItem("bobNumbers")){
    localStorage.setItem("bobNumbers", JSON.stringify([
        {phone:"7262562772",account:"380588331",transferPin:"2772",zipcode:"78211",areaCode:"726",status:"unused"},
        {phone:"7262296502",account:"6502",transferPin:"8723",zipcode:"53072",areaCode:"726",status:"unused"},
        {phone:"7262296588",account:"6588",transferPin:"4749",zipcode:"53076",areaCode:"726",status:"unused"},
        {phone:"2105551234",account:"5551234",transferPin:"1234",zipcode:"75201",areaCode:"210",status:"unused"},
    ]));
}

const generateBtn = document.getElementById("generateBtn");
const quantityInput = document.getElementById("quantity");
const areaCodeSelect = document.getElementById("areaCodeSelect");
const numbersListEl = document.getElementById("numbersList");

generateBtn.addEventListener("click", ()=>{
    let quantity = parseInt(quantityInput.value) || 1;

    // Admin can generate up to 5, others max 4
    const maxQty = (currentUser && currentUser.email==="basheermd2021@gmail.com")?5:4;
    if(quantity>maxQty) quantity=maxQty;

    const storage = JSON.parse(localStorage.getItem("bobNumbers")||"[]");
    const selectedArea = areaCodeSelect.value;

    // Filter unused numbers for the selected area code
    const unusedNumbers = storage.filter(n=>n.status==="unused" && n.areaCode === selectedArea);
    numbersListEl.innerHTML="";

    if(unusedNumbers.length===0){
        numbersListEl.innerHTML="<li>No numbers available for this area code</li>";
        return;
    }

    let generated = unusedNumbers.slice(0,quantity);

    generated.forEach(n=>{
        numbersListEl.innerHTML += `<li>${n.phone} | ${n.account} | ${n.transferPin} | ${n.zipcode}</li>`;
        n.status="pending"; // mark as pending
    });

    // Save updates
    localStorage.setItem("bobNumbers", JSON.stringify(storage));

    // Disable button if reached max
    if(generated.length>=maxQty){
        generateBtn.disabled=true;
    }
});
</script>

</body>
</html>
