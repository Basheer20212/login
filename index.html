<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login Page</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#f2f4f7;
}

.login-container{
background:white;
padding:30px;
width:350px;
border-radius:10px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
text-align:center;
}

.login-container h2{
margin-bottom:20px;
color:#1a73e8;
}

.input-field{
width:100%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

.password-wrapper{
position:relative;
width:100%;
}

.password-wrapper input{
width:100%;
padding-right:40px;
}

.eye-icon{
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
font-size:18px;
color:#555;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:6px;
background:#1a73e8;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1664c0;
}

</style>
</head>

<body>

<div class="login-container">

<h2>Login</h2>

<input type="email" placeholder="Email" class="input-field">

<div class="password-wrapper">

<input type="password" id="password" placeholder="Password" class="input-field">

<span class="eye-icon" onclick="togglePassword()">👁</span>

</div>

<button>Sign In</button>

</div>

<script>

function togglePassword(){

const password = document.getElementById("password");

if(password.type === "password"){
password.type = "text";
}
else{
password.type = "password";
}

}

</script>

</body>
</html>
