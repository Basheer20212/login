<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Users Inventory</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#1f2937,#334155);
    color: white;
    padding: 20px;
}
.container {
    max-width: 900px;
    margin: 0 auto;
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}
h2 { text-align: center; margin-bottom: 20px; }
table { width: 100%; border-collapse: collapse; }
th, td { border: 1px solid #334155; padding: 10px; text-align: center; word-break: break-word; }
th { background: #3b82f6; font-weight: 600; }
.copy-btn, .remove-btn {
    padding: 6px 12px; font-size: 12px; border-radius: 6px; cursor: pointer; margin: 2px;
}
.copy-btn { background: #22c55e; color: white; }
.remove-btn { background: #ef4444; color: white; }
@media(max-width: 600px){
    table, th, td { font-size: 12px; padding: 6px; }
}
</style>
</head>
<body>

<div class="container">
    <h2>Users Inventory</h2>
    <table id="usersTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Email</th>
                <th>Password</th>
                <th>Role</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            <!-- Users will be populated here by JS -->
        </tbody>
    </table>
</div>

<script>
// Fetch users from backend
async function fetchUsers() {
    const res = await fetch('get_users.php');
    const users = await res.json();
    renderUsers(users);
}

function renderUsers(users) {
    const tbody = document.querySelector("#usersTable tbody");
    tbody.innerHTML = "";
    users.forEach(user => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${user.id}</td>
            <td>${user.email}</td>
            <td>${user.password}</td>
            <td>${user.role}</td>
            <td>
                <button class="copy-btn" onclick="copyUser(${user.id})">Copy</button>
                <button class="remove-btn" onclick="removeUser(${user.id})">Remove</button>
            </td>
        `;
        tbody.appendChild(tr);
    });
}

function copyUser(id) {
    const row = document.querySelector(`#usersTable tr td:first-child:contains('${id}')`);
    // Simple copy logic
    const tr = Array.from(document.querySelectorAll('#usersTable tbody tr')).find(r => r.cells[0].innerText == id);
    if (tr) {
        const text = `ID: ${tr.cells[0].innerText}\nEmail: ${tr.cells[1].innerText}\nPassword: ${tr.cells[2].innerText}\nRole: ${tr.cells[3].innerText}`;
        navigator.clipboard.writeText(text).then(()=> alert("User info copied!"));
    }
}

// Remove user from DB
async function removeUser(id) {
    if (confirm("Are you sure you want to remove this user?")) {
        const res = await fetch(`remove_user.php?id=${id}`);
        const data = await res.json();
        if (data.success) {
            alert("User removed successfully!");
            fetchUsers(); // reload table
        } else {
            alert("Failed to remove user.");
        }
    }
}

// Initial fetch
fetchUsers();
</script>

</body>
</html>
