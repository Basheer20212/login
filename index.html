<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
background:linear-gradient(to right,#e0f7fa,#ffffff);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
padding:10px;
}

.login-container{
background:#fff;
padding:40px 30px;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.15);
width:100%;
max-width:360px;
}

h2{
text-align:center;
color:#007bff;
margin-bottom:30px;
font-size:24px;
}

.form-group{
position:relative;
margin-bottom:20px;
}

input{
width:100%;
height:44px;
padding:12px 45px 12px 12px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

/* NEW EYE BUTTON DESIGN */

.toggle-password{
position:absolute;
right:6px;
top:50%;
transform:translateY(-50%);
border:none;
background:#f5f7fb;
width:34px;
height:34px;
border-radius:8px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
color:#007bff;
transition:0.2s;
}

.toggle-password:hover{
background:#e8f0fe;
}

button{
width:100%;
padding:12px;
border-radius:8px;
border:none;
background:#007bff;
color:white;
font-weight:bold;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#0056b3;
}

#errorMsg{
margin-top:10px;
color:#dc3545;
font-size:14px;
text-align:center;
}

</style>
</head>

<body>

<div class="login-container">

<h2>Login</h2>

<div class="form-group">
<input type="email" id="email" placeholder="Email Address" required>
</div>

<div class="form-group">
<input type="password" id="password" placeholder="Password" required>

<button type="button" class="toggle-password" id="togglePassword">
<i class="fa-solid fa-eye"></i>
</button>

</div>

<button id="loginBtn">Sign In</button>

<div id="errorMsg"></div>

</div>

<script>

// DATABASE
if(!localStorage.getItem('users')){
const users=[
{email:'basheermd2021@gmail.com',password:'Basheermd5889$!',roles:['admin']},
{email:'user1@example.com',password:'User1234',roles:[]}
];
localStorage.setItem('users',JSON.stringify(users));
}

const emailInput=document.getElementById('email');
const passwordInput=document.getElementById('password');
const togglePassword=document.getElementById('togglePassword');
const loginBtn=document.getElementById('loginBtn');
const errorMsg=document.getElementById('errorMsg');

// EYE ICON TOGGLE
togglePassword.addEventListener('click',()=>{

const icon=togglePassword.querySelector('i');

if(passwordInput.type==='password'){

passwordInput.type='text';
icon.classList.remove('fa-eye');
icon.classList.add('fa-eye-slash');

}else{

passwordInput.type='password';
icon.classList.remove('fa-eye-slash');
icon.classList.add('fa-eye');

}

});

// ENTER KEY LOGIN
[emailInput,passwordInput].forEach(input=>{
input.addEventListener('keypress',function(e){
if(e.key==='Enter')loginBtn.click();
});
});

// LOGIN SYSTEM
loginBtn.addEventListener('click',()=>{

const email=emailInput.value.trim();
const password=passwordInput.value.trim();

const users=JSON.parse(localStorage.getItem('users')||'[]');

const user=users.find(u=>u.email===email && u.password===password);

if(user){

localStorage.setItem('currentUser',JSON.stringify(user));
window.location.href='https://basheer20212.github.io/login/generate.html';

}else{

errorMsg.innerText="Invalid credentials";

}

});

</script>

</body>
</html>
