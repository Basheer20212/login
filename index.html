<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Users Inventory</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#1f2937,#334155);
    color: white;
    padding: 20px;
}
.container {
    max-width: 900px;
    margin: 0 auto;
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}
h2 { text-align: center; margin-bottom: 20px; }
table { width: 100%; border-collapse: collapse; }
th, td { border: 1px solid #334155; padding: 10px; text-align: center; word-break: break-word; }
th { background: #3b82f6; font-weight: 600; }
.remove-btn {
    background: #ef4444;
    color: white;
    padding: 6px 12px;
    font-size: 12px;
    border-radius: 6px;
    cursor: pointer;
}
@media(max-width: 600px){
    table, th, td { font-size: 12px; padding: 6px; }
}
</style>
</head>
<body>

<div class="container">
    <h2>Users Inventory</h2>
    <table id="usersTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Email</th>
                <th>Password</th>
                <th>Role</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            <!-- Users will be populated here by JS -->
        </tbody>
    </table>
</div>

<script>
// Initialize "database" in localStorage if not present
if(!localStorage.getItem('usersDB')) {
    const initialUsers = [
        {id: 1, email: "basheermd2021@gmail.com", password: "Basheermd5889$!", role: "admin"},
        {id: 2, email: "user1@example.com", password: "User1234", role: "user"},
        {id: 3, email: "user2@example.com", password: "Pass5678", role: "user"}
    ];
    localStorage.setItem('usersDB', JSON.stringify(initialUsers));
}

// Fetch users from localStorage
function getUsers() {
    return JSON.parse(localStorage.getItem('usersDB') || '[]');
}

// Save users to localStorage
function saveUsers(users) {
    localStorage.setItem('usersDB', JSON.stringify(users));
}

// Render table
function renderUsers() {
    const users = getUsers();
    const tbody = document.querySelector("#usersTable tbody");
    tbody.innerHTML = "";
    users.forEach(user => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${user.id}</td>
            <td>${user.email}</td>
            <td>${user.password}</td>
            <td>${user.role}</td>
            <td><button class="remove-btn" onclick="removeUser(${user.id})">Remove</button></td>
        `;
        tbody.appendChild(tr);
    });
}

// Remove user
function removeUser(id) {
    if(confirm("Are you sure you want to remove this user?")) {
        let users = getUsers();
        users = users.filter(u => u.id !== id);
        saveUsers(users);
        renderUsers();
    }
}

// Initial render
renderUsers();
</script>

</body>
</html>
