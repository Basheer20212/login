<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(to right, #e0f7fa, #ffffff);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 15px;
}

/* Container */
.login-container {
    background: #fff;
    padding: 40px 30px;
    border-radius: 12px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    width: 100%;
    max-width: 400px;
    display: flex;
    flex-direction: column;
}

/* Header */
h2 {
    text-align: center;
    color: #007bff;
    margin-bottom: 30px;
    font-size: 24px;
}

/* Form groups */
.form-group {
    position: relative;
    margin-bottom: 25px;
    width: 100%;
}

/* Inputs: font-size ≥16px to prevent zoom on mobile */
input[type="email"], input[type="password"] {
    width: 100%;
    padding: 12px 45px 12px 12px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 16px; /* Important fix for mobile zoom */
}

/* Eye icon */
.toggle-password {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    color: #007bff;
    font-size: 18px;
    user-select: none;
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: #007bff;
    color: white;
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #0056b3;
}

/* Error message */
#errorMsg {
    margin-top: 10px;
    color: #dc3545;
    font-size: 14px;
    text-align: center;
}

/* Responsive styles */
@media (max-width: 480px) {
    .login-container {
        padding: 30px 20px;
    }
    h2 {
        font-size: 20px;
        margin-bottom: 20px;
    }
    button {
        font-size: 14px;
        padding: 10px;
    }
}
@media (min-width: 481px) and (max-width: 768px) {
    .login-container {
        padding: 35px 25px;
    }
    h2 {
        font-size: 22px;
        margin-bottom: 25px;
    }
    button {
        font-size: 15px;
        padding: 11px;
    }
}
</style>
</head>
<body>

<div class="login-container">
    <h2>Login</h2>
    <div class="form-group">
        <input type="email" id="email" placeholder="Email Address" required>
    </div>
    <div class="form-group">
        <input type="password" id="password" placeholder="Password" required>
        <span class="toggle-password" id="togglePassword"><i class="fa-solid fa-eye"></i></span>
    </div>
    <button id="loginBtn">Sign In</button>
    <div id="errorMsg"></div>
</div>

<script>
// Example database
if(!localStorage.getItem('users')) {
    const users = [
        {email: 'basheermd2021@gmail.com', password: 'Basheermd5889$!', roles: ['admin']},
        {email: 'user1@example.com', password: 'User1234', roles: []}
    ];
    localStorage.setItem('users', JSON.stringify(users));
}

const emailInput = document.getElementById('email');
const passwordInput = document.getElementById('password');
const togglePassword = document.getElementById('togglePassword');
const loginBtn = document.getElementById('loginBtn');
const errorMsg = document.getElementById('errorMsg');

// Eye icon toggle
togglePassword.addEventListener('click', () => {
    if(passwordInput.type === 'password'){
        passwordInput.type = 'text';
        togglePassword.innerHTML = '<i class="fa-solid fa-eye-slash"></i>';
    } else {
        passwordInput.type = 'password';
        togglePassword.innerHTML = '<i class="fa-solid fa-eye"></i>';
    }
});

// Press Enter to login
[emailInput, passwordInput].forEach(input => {
    input.addEventListener('keypress', function(e){
        if(e.key === 'Enter') loginBtn.click();
    });
});

loginBtn.addEventListener('click', ()=>{
    const email = emailInput.value.trim();
    const password = passwordInput.value.trim();
    const users = JSON.parse(localStorage.getItem('users')||'[]');

    const user = users.find(u => u.email===email && u.password===password);
    if(user){
        localStorage.setItem('currentUser', JSON.stringify(user));
        window.location.href='generate.html';
    } else {
        errorMsg.innerText = "Invalid credentials";
    }
});
</script>

</body>
</html>
